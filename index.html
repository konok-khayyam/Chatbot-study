<script type="module" defer>

import Chatbot from "https://cdn.n8nchatui.com/v1/embed.js";

/* =========================
   SAVE LIMESURVEY PAGE
========================= */

if (
  document.referrer.includes("survey.media.tuwien.ac.at")
) {

  localStorage.setItem(
    "surveyReturnUrl",
    document.referrer
  );

}

/* =========================
   CHATBOT INIT
========================= */

Chatbot.init({

  n8nChatUrl:
    "https://n8n.media.tuwien.ac.at/webhook/553640ac-4edf-461a-aa03-916374ecae33",

  theme: {

    button: {

      backgroundColor: "#b0b0b0",

      right: 251,
      bottom: 35,

      size: 50,

      iconColor: "#373434",

      customIconSrc:
        "https://www.svgrepo.com/show/362552/chat-centered-dots-bold.svg",

      customIconSize: 68,

      customIconBorderRadius: 21,

      autoWindowOpen: {

        autoOpen: true,
        openDelay: 1

      },

      borderRadius: "rounded",

      draggable: false

    },

    tooltip: {

      showTooltip: false

    },

    allowProgrammaticMessage: false,

    chatWindow: {

      borderRadiusStyle: "rounded",

      avatarBorderRadius: 25,

      messageBorderRadius: 6,

      showTitle: false,

      avatarSize: 40,

      welcomeMessage:
        "Hello! Thank you for participating in this study.",

      errorMessage:
        "Please connect me to n8n first",

      backgroundColor: "#ffffff",

      height: 550,

      width: 1000,

      fontSize: 20,

      starterPromptFontSize: 15,

      renderHTML: false,

      clearChatOnReload: false,

      showScrollbar: false,

      botMessage: {

        backgroundColor: "#b0b0b0",

        textColor: "#fafafa",

        showAvatar: true,

        avatarSrc:
          "https://www.svgrepo.com/show/334455/bot.svg",

        showCopyToClipboardIcon: false

      },

      userMessage: {

        backgroundColor: "#D8C3B5",

        textColor: "#2F3440",

        showAvatar: true,

        avatarSrc:
          "https://www.svgrepo.com/show/532363/user-alt-1.svg"

      },

      textInput: {

        placeholder: "Type your message....",

        backgroundColor: "#ffffff",

        textColor: "#1e1e1f",

        sendButtonColor: "#030303",

        maxChars: 100,

        maxCharsWarningMessage:
          "You exceeded the characters limit.",

        autoFocus: false,

        enableInputHistory: true,

        borderRadius: 6,

        sendButtonBorderRadius: 50

      }

    }

  }

});

/* =========================
   FORCE CHAT AUTO OPEN
========================= */

window.addEventListener("load", () => {

  setTimeout(() => {

    const buttons =
      document.querySelectorAll("button");

    buttons.forEach(btn => {

      const svg = btn.querySelector("svg");

      if (svg) {

        btn.click();

      }

    });

  }, 1500);

});

/* =========================
   TIMER + REDIRECT
========================= */

window.addEventListener("load", () => {

  setTimeout(() => {

    const interval = setInterval(() => {

      const chatWindow =
        document.querySelector(
          '[class*="chat-window"]'
        );

      const header =
        document.querySelector(
          '[class*="header"]'
        );

      if (chatWindow && header) {

        clearInterval(interval);

        /* TIMER */

        const timer =
          document.createElement("div");

        timer.id = "studyTimer";

        timer.innerText = "00:30";

        /* TIMER STYLE */

        timer.style.position = "absolute";

        timer.style.left = "18px";

        timer.style.top = "16px";

        timer.style.background = "#ffffff";

        timer.style.borderRadius = "14px";

        timer.style.padding =
          "8px 18px";

        timer.style.fontSize =
          "18px";

        timer.style.fontWeight =
          "700";

        timer.style.color =
          "#3B455A";

        timer.style.boxShadow =
          "0 2px 6px rgba(0,0,0,0.08)";

        timer.style.zIndex =
          "999999";

        header.style.position =
          "relative";

        header.appendChild(timer);

        /* COUNTDOWN */

        let totalTime = 30;

        const countdown =
          setInterval(() => {

          totalTime--;

          const minutes =
            String(
              Math.floor(totalTime / 60)
            ).padStart(2, "0");

          const seconds =
            String(
              totalTime % 60
            ).padStart(2, "0");

          timer.innerText =
            `${minutes}:${seconds}`;

          /* END SESSION */

          if (totalTime <= 0) {

            clearInterval(countdown);

            chatWindow.innerHTML = `

              <div style="
                height:100%;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                text-align:center;
                padding:40px;
                font-family:Arial;
              ">

                <h2 style="
                  color:#3B455A;
                  margin-bottom:20px;
                ">
                  Thank you for participating.
                </h2>

                <p style="
                  font-size:18px;
                  color:#666;
                  line-height:1.6;
                  max-width:600px;
                ">
                  You are now being redirected
                  back to the survey.
                  Please press NEXT to continue.
                </p>

              </div>

            `;

            /* REDIRECT */

            setTimeout(() => {

              const returnUrl =
                localStorage.getItem(
                  "surveyReturnUrl"
                );

              if (returnUrl) {

                window.location.href =
                  returnUrl;

              }

            }, 3000);

          }

        }, 1000);

      }

    }, 500);

  }, 2000);

});

</script>

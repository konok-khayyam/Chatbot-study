<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Study</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      background: #F9FAFB;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      color: #2F4156;
      font-size: 32px;
      font-weight: 600;
    }

    /* ========================================
       TIMER
    ======================================== */

    #study-timer {
      position: fixed;
      top: 18px;
      right: 24px;
      z-index: 9999;

      background: #E5E7EB;
      color: #374151;

      padding: 10px 18px;
      border-radius: 10px;

      font-size: 18px;
      font-weight: 600;

      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* ========================================
       END OVERLAY
    ======================================== */

    #end-overlay {

      display: none;

      position: fixed;
      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

      background: rgba(0,0,0,0.55);

      z-index: 10000;

      justify-content: center;
      align-items: center;

    }

    #end-box {

      background: white;

      width: 420px;

      padding: 40px;

      border-radius: 18px;

      text-align: center;

      box-shadow: 0 8px 30px rgba(0,0,0,0.15);

    }

    #end-box h2 {

      margin-top: 0;
      color: #2F4156;

    }

    #end-box p {

      color: #374151;
      line-height: 1.6;

    }

  </style>

</head>

<body>

<h1>Conversation Study</h1>

<!-- ========================================
     TIMER
======================================== -->

<div id="study-timer">
  00:30
</div>

<!-- ========================================
     END SCREEN
======================================== -->

<div id="end-overlay">

  <div id="end-box">

    <h2>Conversation Completed</h2>

    <p>
      Thank you for participating in this study.
      <br><br>
      You will now return to the survey page.
      <br><br>
      After returning, please click the
      <strong>Next</strong> button to continue.
    </p>

  </div>

</div>

<script type="module">

import Chatbot from "https://cdn.n8nchatui.com/v1/embed.js";

// ========================================
// SESSION ID
// ========================================

let sessionId = localStorage.getItem("sessionId");

if (!sessionId) {

  sessionId = crypto.randomUUID();

  localStorage.setItem("sessionId", sessionId);

}

// ========================================
// RANDOM CONDITION
// ========================================

let condition = localStorage.getItem("condition");

if (!condition) {

  condition = Math.floor(Math.random() * 4) + 1;

  localStorage.setItem("condition", condition);

}

console.log("Session ID:", sessionId);
console.log("Condition:", condition);

// ========================================
// CHATBOT
// ========================================

Chatbot.init({

  n8nChatUrl:
    "https://n8n.media.tuwien.ac.at/webhook/553640ac-4edf-461a-aa03-916374ecae33",

  metadata: {

    sessionId: sessionId,
    condition: condition

  },

  theme: {

    button: {

      backgroundColor: "#2F4156",

      right: 20,
      bottom: 20,

      size: 55

    },

    chatWindow: {

      welcomeMessage:
        "Hello. Thank you for participating in this study. You may begin the conversation whenever you are ready.",

      height: 650,
      width: 1200

    },

    userMessage: {

      backgroundColor: "#BFD7EA",
      textColor: "#1F2937"

    },

    botMessage: {

      backgroundColor: "#DCE6F2",
      textColor: "#1F2937"

    },

    sendButton: {

      backgroundColor: "#2F4156"

    },

    input: {

      placeholder: "Type your message..."

    }

  }

});

// ========================================
// AUTO OPEN CHAT AFTER 1 SECOND
// ========================================

setTimeout(() => {

  const chatButton = document.querySelector("button");

  if (chatButton) {

    chatButton.click();

  }

}, 1000);

// ========================================
// TIMER
// ========================================

let totalSeconds = 30;

const timerDisplay = document.getElementById("study-timer");

const timerInterval = setInterval(() => {

  totalSeconds--;

  const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');

  const seconds = String(totalSeconds % 60).padStart(2, '0');

  timerDisplay.innerText = `${minutes}:${seconds}`;

  // ========================================
  // TIMER END
  // ========================================

  if (totalSeconds <= 0) {

    clearInterval(timerInterval);

    // SHOW OVERLAY

    document.getElementById("end-overlay").style.display = "flex";

    // REDIRECT AFTER 4 SECONDS

    setTimeout(() => {

      window.location.href =
        "https://survey.media.tuwien.ac.at/index.php/718311?lang=en";

    }, 4000);

  }

}, 1000);

</script>

</body>

</html>

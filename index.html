<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Study</title>
</head>

<body>

<h1>Chatbot Test Page</h1>

<script type="module">

import Chatbot from "https://cdn.n8nchatui.com/v1/embed.js";

// =========================
// SESSION ID
// =========================

let sessionId = localStorage.getItem("sessionId");

if (!sessionId) {
  sessionId = crypto.randomUUID();
  localStorage.setItem("sessionId", sessionId);
}

// =========================
// CONDITION
// =========================

let condition = localStorage.getItem("condition");

if (!condition) {
  condition = Math.floor(Math.random() * 4) + 1;
  localStorage.setItem("condition", condition);
}

console.log("Session ID:", sessionId);
console.log("Condition:", condition);

// =========================
// CHATBOT
// =========================

Chatbot.init({

  n8nChatUrl: "PASTE_YOUR_WEBHOOK_URL_HERE",

  metadata: {
    sessionId: sessionId,
    condition: condition
  },

  theme: {

    button: {
      backgroundColor: "#ffb59e",
      right: 20,
      bottom: 20,
      size: 50
    },

    chatWindow: {
      welcomeMessage: "Hello! Chatbot loaded successfully.",
      height: 600,
      width: 400
    }

  }

});

</script>

</body>
</html>

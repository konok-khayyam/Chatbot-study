<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Study</title>
</head>

<body>

<h1>Chatbot Test Page</h1>

<script type="module">

import Chatbot from "https://cdn.n8nchatui.com/v1/embed.js";

// ========================================
// SESSION ID
// ========================================

let sessionId = localStorage.getItem("sessionId");

if (!sessionId) {
  sessionId = crypto.randomUUID();
  localStorage.setItem("sessionId", sessionId);
}

// ========================================
// RANDOM CONDITION
// ========================================

let condition = localStorage.getItem("condition");

if (!condition) {
  condition = Math.floor(Math.random() * 4) + 1;
  localStorage.setItem("condition", condition);
}

console.log("Session ID:", sessionId);
console.log("Condition:", condition);

// ========================================
// SAVE CURRENT SURVEY PAGE
// ========================================

localStorage.setItem("surveyReturnPage", window.location.href);

// ========================================
// CHATBOT
// ========================================

Chatbot.init({

  n8nChatUrl:
    "https://n8n.media.tuwien.ac.at/webhook/553640ac-4edf-461a-aa03-916374ecae33",

  metadata: {
    sessionId: sessionId,
    condition: condition
  },

  theme: {

    button: {
      backgroundColor: "#ffb59e",
      right: 20,
      bottom: 20,
      size: 50
    },

    chatWindow: {
      welcomeMessage:
        "Hello! Thank you for participating in this study.",
      height: 650,
      width: 1200
    }

  }

});

// ========================================
// 30 SECOND TIMER TEST
// ========================================

setTimeout(() => {

  alert("Conversation time ended. Returning to survey.");

  // ========================================
  // REDIRECT TO SURVEY PAGE
  // ========================================

  window.location.href =
    "https://survey.media.tuwien.ac.at/index.php/718311?lang=en";

}, 30000);

</script>

</body>
</html>

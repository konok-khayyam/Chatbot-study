<script type="module" defer>

import Chatbot from "https://cdn.n8nchatui.com/v1/embed.js";

/* =========================
   SESSION ID
========================= */

let sessionId = localStorage.getItem("sessionId");

if (!sessionId) {

  sessionId = crypto.randomUUID();

  localStorage.setItem("sessionId", sessionId);

}

/* =========================
   CONDITION
========================= */

let condition = localStorage.getItem("condition");

if (!condition) {

  condition = Math.floor(Math.random() * 4) + 1;

  localStorage.setItem("condition", condition);

}

/* =========================
   SAVE SURVEY PAGE
========================= */

if (
  document.referrer.includes("survey.media.tuwien.ac.at")
) {

  localStorage.setItem(
    "surveyReturnUrl",
    document.referrer
  );

}

/* =========================
   CHATBOT INIT
========================= */

Chatbot.init({

  n8nChatUrl:
    "https://n8n.media.tuwien.ac.at/webhook/553640ac-4edf-461a-aa03-916374ecae33",

  metadata: {

    sessionId: sessionId,
    condition: condition

  },

  theme: {

    button: {

      backgroundColor: "#b0b0b0",

      right: 251,
      bottom: 35,

      size: 50,

      iconColor: "#373434",

      customIconSrc:
        "https://www.svgrepo.com/show/362552/chat-centered-dots-bold.svg",

      customIconSize: 68,

      customIconBorderRadius: 21,

      autoWindowOpen: {

        autoOpen: true,
        openDelay: 1

      },

      borderRadius: "rounded",

      draggable: false

    },

    tooltip: {

      showTooltip: false

    },

    allowProgrammaticMessage: false,

    chatWindow: {

      borderRadiusStyle: "rounded",

      avatarBorderRadius: 25,

      messageBorderRadius: 6,

      showTitle: false,

      avatarSize: 40,

      welcomeMessage:
        "Hello! Thank you for participating in this study.",

      errorMessage:
        "Please connect me to n8n first",

      backgroundColor: "#ffffff",

      height: 550,

      width: 1000,

      fontSize: 20,

      starterPromptFontSize: 15,

      renderHTML: false,

      clearChatOnReload: false,

      showScrollbar: false,

      botMessage: {

        backgroundColor: "#b0b0b0",

        textColor: "#fafafa",

        showAvatar: true,

        avatarSrc:
          "https://www.svgrepo.com/show/334455/bot.svg",

        showCopyToClipboardIcon: false

      },

      userMessage: {

        backgroundColor: "#D8C3B5",

        textColor: "#2F3440",

        showAvatar: true,

        avatarSrc:
          "https://www.svgrepo.com/show/532363/user-alt-1.svg"

      },

      textInput: {

        placeholder: "Type your message....",

        backgroundColor: "#ffffff",

        textColor: "#1e1e1f",

        sendButtonColor: "#030303",

        maxChars: 100,

        maxCharsWarningMessage:
          "You exceeded the characters limit.",

        autoFocus: false,

        enableInputHistory: true,

        borderRadius: 6,

        sendButtonBorderRadius: 50

      }

    }

  }

});

/* =========================
   FORCE AUTO OPEN
========================= */

window.addEventListener("load", () => {

  setTimeout(() => {

    const allButtons =
      document.querySelectorAll("button");

    allButtons.forEach(btn => {

      const svg = btn.querySelector("svg");

      if (svg) {

        btn.click();

      }

    });

  }, 1200);

});

/* =========================
   TIMER INSIDE CHAT
========================= */

const observer = new MutationObserver(() => {

  const chatWindow =
    document.querySelector('[class*="chat-window"]');

  if (
    chatWindow &&
    !document.getElementById("studyTimer")
  ) {

    /* TIMER */

    const timer = document.createElement("div");

    timer.id = "studyTimer";

    timer.innerText = "00:30";

    /* STYLE */

    timer.style.position = "absolute";

    timer.style.top = "16px";

    timer.style.left = "18px";

    timer.style.background = "#ffffff";

    timer.style.border = "1px solid #DADADA";

    timer.style.borderRadius = "16px";

    timer.style.padding = "8px 18px";

    timer.style.fontSize = "18px";

    timer.style.fontWeight = "600";

    timer.style.color = "#3B455A";

    timer.style.zIndex = "99999";

    timer.style.boxShadow =
      "0 2px 6px rgba(0,0,0,0.08)";

    chatWindow.style.position = "relative";

    chatWindow.appendChild(timer);

    /* =========================
       TIMER LOGIC
    ========================== */

    let totalTime = 30;

    const countdown = setInterval(() => {

      totalTime--;

      const minutes = String(
        Math.floor(totalTime / 60)
      ).padStart(2, "0");

      const seconds = String(
        totalTime % 60
      ).padStart(2, "0");

      timer.innerText =
        `${minutes}:${seconds}`;

      /* =========================
         END SESSION
      ========================== */

      if (totalTime <= 0) {

        clearInterval(countdown);

        /* HIDE CHAT */

        chatWindow.innerHTML = `

          <div style="
            height:100%;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:40px;
            text-align:center;
            font-family:Arial;
          ">

            <h2 style="
              margin-bottom:20px;
              color:#3B455A;
            ">
              Thank you for the interaction.
            </h2>

            <p style="
              font-size:18px;
              color:#666;
              max-width:600px;
              line-height:1.6;
            ">
              We are now redirecting you back to the survey.
              Please press the NEXT button in LimeSurvey
              to continue the study.
            </p>

          </div>

        `;

        /* =========================
           REDIRECT
        ========================== */

        setTimeout(() => {

          const returnUrl =
            localStorage.getItem(
              "surveyReturnUrl"
            );

          if (returnUrl) {

            window.location.href =
              returnUrl;

          }

        }, 3000);

      }

    }, 1000);

  }

});

observer.observe(document.body, {

  childList: true,
  subtree: true

});

</script>

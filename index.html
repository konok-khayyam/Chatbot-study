<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Chatbot Study</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #F6F6F8;
      font-family: Arial, sans-serif;
    }

    /* =========================
       TIMER INSIDE CHAT
    ========================== */

    #timer-box {

      position: fixed;

      top: 24px;
      left: 24px;

      z-index: 999999;

      background: #E7E7EA;

      color: #3B455A;

      padding: 10px 18px;

      border-radius: 18px;

      font-size: 18px;
      font-weight: 600;

      box-shadow: 0 2px 8px rgba(0,0,0,0.08);

    }

  </style>

</head>

<body>

  <!-- TIMER -->

  <div id="timer-box">
    00:30
  </div>

  <script type="module">

    import Chatbot from "https://cdn.n8nchatui.com/v1/embed.js";

    // =========================
    // SESSION ID
    // =========================

    let sessionId = localStorage.getItem("sessionId");

    if (!sessionId) {

      sessionId = crypto.randomUUID();

      localStorage.setItem("sessionId", sessionId);

    }

    // =========================
    // CONDITION
    // =========================

    let condition = localStorage.getItem("condition");

    if (!condition) {

      condition = Math.floor(Math.random() * 4) + 1;

      localStorage.setItem("condition", condition);

    }

    // =========================
    // SAVE SURVEY PAGE
    // =========================

    if (document.referrer.includes("survey.media.tuwien.ac.at")) {

      localStorage.setItem(
        "surveyReturnUrl",
        document.referrer
      );

    }

    // =========================
    // CHATBOT
    // =========================

    Chatbot.init({

      n8nChatUrl:
        "https://n8n.media.tuwien.ac.at/webhook/553640ac-4edf-461a-aa03-916374ecae33",

      metadata: {

        sessionId: sessionId,
        condition: condition

      },

      theme: {

        button: {

          backgroundColor: "#3B455A",

          iconColor: "#FFFFFF",

          size: 70,

          right: 20,
          bottom: 20

        },

        chatWindow: {

          showTitle: false,

          width: 1100,

          height: 620,

          welcomeMessage:
            "Hello! Thank you for participating in this study.",

          backgroundColor: "#FFFFFF",

          borderRadiusStyle: "rounded",

          placeholder: "Type your message...",

          starterPrompts: [],

          clearChatOnReload: false,

          botMessage: {

            backgroundColor: "#ECEAF4",

            textColor: "#2F3440"

          },

          userMessage: {

            backgroundColor: "#D8C3B5",

            textColor: "#2F3440"

          }

        }

      }

    });

    // =========================
    // AUTO OPEN CHAT
    // =========================

    setTimeout(() => {

      const buttons = document.querySelectorAll("button");

      buttons.forEach(btn => {

        if (
          btn.innerHTML.includes("svg") ||
          btn.textContent.trim() === ""
        ) {

          btn.click();

        }

      });

    }, 800);

    // =========================
    // CLEAN UI
    // =========================

    const observer = new MutationObserver(() => {

      // CHAT WINDOW

      const chatWindow =
        document.querySelector('[class*="chat-window"]');

      if (chatWindow) {

        chatWindow.style.borderRadius = "32px";

        chatWindow.style.boxShadow =
          "0 8px 30px rgba(0,0,0,0.08)";

        chatWindow.style.overflow = "hidden";

      }

      // HEADER

      const header =
        document.querySelector('[class*="header"]');

      if (header) {

        header.style.height = "70px";

        header.style.background = "#FFFFFF";

        header.style.borderBottom =
          "1px solid #ECECEC";

      }

      // INPUT AREA

      const textarea =
        document.querySelector("textarea");

      if (textarea) {

        textarea.style.height = "52px";

        textarea.style.fontSize = "18px";

      }

    });

    observer.observe(document.body, {

      childList: true,
      subtree: true

    });

    // =========================
    // TIMER
    // =========================

    let totalTime = 30;

    const timerDisplay =
      document.getElementById("timer-box");

    const timer = setInterval(() => {

      totalTime--;

      const minutes = String(
        Math.floor(totalTime / 60)
      ).padStart(2, "0");

      const seconds = String(
        totalTime % 60
      ).padStart(2, "0");

      timerDisplay.innerText =
        `${minutes}:${seconds}`;

      // =========================
      // REDIRECT
      // =========================

      if (totalTime <= 0) {

        clearInterval(timer);

        alert(
          "Conversation time completed. Please press NEXT in the survey to continue."
        );

        const returnUrl =
          localStorage.getItem("surveyReturnUrl");

        if (returnUrl) {

          window.location.href = returnUrl;

        }

      }

    }, 1000);

  </script>

</body>

</html>

<script type="module" defer>

import Chatbot from "https://cdn.n8nchatui.com/v1/embed.js";

/* =========================
   SESSION ID
========================= */

let sessionId = localStorage.getItem("sessionId");

if (!sessionId) {

  sessionId = crypto.randomUUID();

  localStorage.setItem("sessionId", sessionId);

}

/* =========================
   CONDITION
========================= */

let condition = localStorage.getItem("condition");

if (!condition) {

  condition = Math.floor(Math.random() * 4) + 1;

  localStorage.setItem("condition", condition);

}

/* =========================
   SAVE SURVEY PAGE URL
========================= */

if (
  document.referrer.includes("survey.media.tuwien.ac.at")
) {

  localStorage.setItem(
    "surveyReturnUrl",
    document.referrer
  );

}

/* =========================
   TIMER ELEMENT
========================= */

const timerBox = document.createElement("div");

timerBox.id = "studyTimer";

timerBox.innerText = "00:30";

document.body.appendChild(timerBox);

/* =========================
   TIMER STYLE
========================= */

const style = document.createElement("style");

style.innerHTML = `

#studyTimer {

  position: fixed;

  top: 88px;
  left: 290px;

  z-index: 999999;

  background: #ffffff;

  color: #3B455A;

  padding: 10px 20px;

  border-radius: 16px;

  font-size: 18px;
  font-weight: 600;

  box-shadow: 0 2px 8px rgba(0,0,0,0.08);

  border: 1px solid #EAEAEA;

}

`;

document.head.appendChild(style);

/* =========================
   CHATBOT
========================= */

Chatbot.init({

  n8nChatUrl:
    "https://n8n.media.tuwien.ac.at/webhook/553640ac-4edf-461a-aa03-916374ecae33",

  metadata: {

    sessionId: sessionId,
    condition: condition

  },

  theme: {

    button: {

      backgroundColor: "#b0b0b0",

      right: 251,
      bottom: 35,

      size: 50,

      iconColor: "#373434",

      customIconSrc:
        "https://www.svgrepo.com/show/362552/chat-centered-dots-bold.svg",

      customIconSize: 68,

      customIconBorderRadius: 21,

      autoWindowOpen: {

        autoOpen: true,
        openDelay: 1

      },

      borderRadius: "rounded",

      draggable: false

    },

    tooltip: {

      showTooltip: false

    },

    allowProgrammaticMessage: false,

    chatWindow: {

      borderRadiusStyle: "rounded",

      avatarBorderRadius: 25,

      messageBorderRadius: 6,

      showTitle: false,

      title: "N8N Chat UI Bot",

      titleAvatarSrc:
        "https://www.svgrepo.com/show/362552/chat-centered-dots-bold.svg",

      avatarSize: 40,

      welcomeMessage:
        "Hello! Thank you for participating in this study.",

      errorMessage:
        "Please connect me to n8n first",

      backgroundColor: "#ffffff",

      height: 550,

      width: 1000,

      fontSize: 20,

      starterPromptFontSize: 15,

      renderHTML: false,

      clearChatOnReload: false,

      showScrollbar: false,

      botMessage: {

        backgroundColor: "#ECEAF4",

        textColor: "#2F3440",

        showAvatar: true,

        avatarSrc:
          "https://www.svgrepo.com/show/334455/bot.svg",

        showCopyToClipboardIcon: false

      },

      userMessage: {

        backgroundColor: "#D8C3B5",

        textColor: "#2F3440",

        showAvatar: true,

        avatarSrc:
          "https://www.svgrepo.com/show/532363/user-alt-1.svg"

      },

      textInput: {

        placeholder: "Type your message....",

        backgroundColor: "#ffffff",

        textColor: "#1e1e1f",

        sendButtonColor: "#030303",

        maxChars: 100,

        maxCharsWarningMessage:
          "You exceeded the characters limit.",

        autoFocus: false,

        enableInputHistory: true,

        borderRadius: 6,

        sendButtonBorderRadius: 50

      }

    }

  }

});

/* =========================
   TIMER LOGIC
========================= */

let totalTime = 30;

const timer = setInterval(() => {

  totalTime--;

  const minutes = String(
    Math.floor(totalTime / 60)
  ).padStart(2, "0");

  const seconds = String(
    totalTime % 60
  ).padStart(2, "0");

  timerBox.innerText =
    `${minutes}:${seconds}`;

  /* =========================
     REDIRECT
  ========================= */

  if (totalTime <= 0) {

    clearInterval(timer);

    alert(
      "Conversation time completed. Please click NEXT in the survey to continue."
    );

    const returnUrl =
      localStorage.getItem("surveyReturnUrl");

    if (returnUrl) {

      window.location.href = returnUrl;

    }

  }

}, 1000);

</script>
